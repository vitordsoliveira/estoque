<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Familias - Estoque</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='images/simbolo.png') }}" type="image/x-icon">
    <!-- MODAL CSS -->
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--white);
            width: 100%;
            max-width: 400px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .form-group input {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            outline: none;
            font-size: 0.95rem;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>

<body>
    {% include '_header.html' %}

    <main class="dashboard-container">
        <div class="page-header">
            <div>
                <h2>Familias</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Gerencie as familias que serão vinculadas aos
                    SKUs.</p>
            </div>
            <button class="btn-primary" id="btn-nova-familia"><i class="fas fa-plus"></i> Nova Familia</button>
        </div>

        <section class="toolbar">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar familia por nome..." data-table-search data-table-target="#familia-table" data-empty-message="Nenhuma família encontrada.">
            </div>
        </section>

        <section class="table-container">
            <table class="estoque-table" id="familia-table">
                <thead>
                    <tr>
                        <th>Nome da Familia</th>
                        <th style="text-align: center;">Total de SKUs Vinculados</th>
                        <th style="width: 150px;">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for familia in familias %}
                    <tr data-searchable-row data-search-text="{{ familia.nome }} {{ familia.skus|length }}">
                        <td><strong>{{ familia.nome }}</strong></td>
                        <td style="text-align: center;">
                            <span class="badge" style="background: #f1f5f9; color: #475569;">
                                {{ familia.skus|length }}
                            </span>
                        </td>
                        <td>
                            <button class="btn-icon" title="Editar" data-id="{{ familia.id }}" data-nome="{{ familia.nome }}" onclick="abrirEditarFamilia(this)"><i class="fas fa-edit"></i></button>
                            <form action="{{ url_for('familia.deletar_familia', id=familia.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Tem certeza que deseja deletar esta família?');">
                                <button type="submit" class="btn-icon text-danger" title="Excluir"><i class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>

    <div class="modal-overlay" id="modal-familia">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cadastrar Família</h2>
                <button class="btn-close" id="btn-close-familia"><i class="fas fa-times"></i></button>
            </div>

            <div class="modal-body">
                <form action="{{ url_for('familia.cadastrar_familia') }}" method="POST">
                    <div class="form-group">
                        <label for="nome">Nome da Família</label>
                        <input type="text" id="nome" name="nome" placeholder="Ex: Eletrônicos, Vestuário..." required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" id="btn-cancelar-familia">Cancelar</button>
                        <button type="submit" class="btn-primary">Salvar Família</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-editar-familia">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Família</h2>
                <button class="btn-close" id="btn-close-editar-familia"><i class="fas fa-times"></i></button>
            </div>

            <div class="modal-body">
                <form id="form-editar-familia" method="POST">
                    <div class="form-group">
                        <label for="nome-editar">Nome da Família</label>
                        <input type="text" id="nome-editar" name="nome" placeholder="Ex: Eletrônicos, Vestuário..." required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" id="btn-cancelar-editar-familia">Cancelar</button>
                        <button type="submit" class="btn-primary">Atualizar Família</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    {% include '_footer.html' %}
    <script src="{{ url_for('static', filename='js/javascript.js') }}"></script>

    <script>
        const btnNovaFamilia = document.getElementById('btn-nova-familia');
        const modalFamilia = document.getElementById('modal-familia');
        const btnCloseFamilia = document.getElementById('btn-close-familia');
        const btnCancelarFamilia = document.getElementById('btn-cancelar-familia');

        const modalEditarFamilia = document.getElementById('modal-editar-familia');
        const btnCloseEditarFamilia = document.getElementById('btn-close-editar-familia');
        const btnCancelarEditarFamilia = document.getElementById('btn-cancelar-editar-familia');
        const formEditarFamilia = document.getElementById('form-editar-familia');

        btnNovaFamilia.addEventListener('click', () => modalFamilia.classList.add('active'));

        const fecharModal = (modal) => modal.classList.remove('active');

        btnCloseFamilia.addEventListener('click', () => fecharModal(modalFamilia));
        btnCancelarFamilia.addEventListener('click', () => fecharModal(modalFamilia));
        
        btnCloseEditarFamilia.addEventListener('click', () => fecharModal(modalEditarFamilia));
        btnCancelarEditarFamilia.addEventListener('click', () => fecharModal(modalEditarFamilia));

        window.addEventListener('click', (e) => {
            if (e.target === modalFamilia) fecharModal(modalFamilia);
            if (e.target === modalEditarFamilia) fecharModal(modalEditarFamilia);
        });

        function abrirEditarFamilia(button) {
            const id = button.getAttribute('data-id');
            const nome = button.getAttribute('data-nome');
            
            document.getElementById('nome-editar').value = nome;
            formEditarFamilia.action = `/familia/editar_familia/${id}`;
            
            modalEditarFamilia.classList.add('active');
        }
    </script>
</body>

</html>
