<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estoque</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='images/simbolo.png') }}" type="image/x-icon">
</head>

<body class="login-body">
    <main class="login-stage">
        <div class="login-glow login-glow-left"></div>
        <div class="login-glow login-glow-right"></div>

        <section class="login-card">
            <div class="login-brand">
                <div class="login-brand-icon"><i class="fas fa-layer-group"></i></div>
                <div>
                    <span class="login-brand-label">Sistema</span>
                    <h2>Estoque</h2>
                </div>
            </div>

            <div class="login-copy">
                <h1>Entrar no sistema</h1>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <section class="login-flash-stack" aria-live="polite" aria-atomic="true">
                {% for category, message in messages %}
                <div class="login-flash login-flash-{{ category }}">
                    <i class="fas fa-circle-info"></i>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            </section>
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.login') }}" method="POST" class="login-form">
                <input type="hidden" name="next" value="{{ next }}">

                <label class="login-field">
                    <span>E-mail</span>
                    <input type="email" name="email" value="{{ email }}" placeholder="usuario@estoque.com" autocomplete="email" required>
                </label>

                <label class="login-field">
                    <span>Senha</span>
                    <div class="login-password-wrapper">
                        <input id="login-password" type="password" name="password" placeholder="Sua senha" autocomplete="current-password" required>
                        <button type="button" class="login-password-toggle" data-password-toggle aria-controls="login-password" aria-label="Mostrar senha">
                            <i class="fas fa-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </label>

                <button type="submit" class="btn-primary login-submit">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    Entrar no sistema
                </button>
            </form>
        </section>
    </main>

    <script>
        const passwordToggleButton = document.querySelector('[data-password-toggle]');
        const passwordInput = document.getElementById('login-password');

        if (passwordToggleButton && passwordInput) {
            passwordToggleButton.addEventListener('click', () => {
                const isHidden = passwordInput.type === 'password';
                const toggleLabel = passwordToggleButton.querySelector('span');
                const toggleIcon = passwordToggleButton.querySelector('i');

                passwordInput.type = isHidden ? 'text' : 'password';
                passwordToggleButton.setAttribute('aria-label', isHidden ? 'Ocultar senha' : 'Mostrar senha');
                toggleIcon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
            });
        }
    </script>
</body>

</html>
